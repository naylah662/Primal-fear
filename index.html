<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Primal fear</title>
    <!-- We are loading the Supabase cloud script here -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            color: #ffffff;
            border-bottom: 2px solid #ff4a5a;
            padding-bottom: 10px;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .input-area {
            background-color: #262626;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row select, .row input {
            flex: 1;
        }
        input, select, button {
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
        }
        input { background-color: #333; color: white; }
        select { background-color: #333; color: white; }
        button {
            background-color: #ff4a5a;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #e03e4d; }
        .category-block {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #ff4a5a;
        }
        .category-title {
            color: #fff;
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        h3 {
            color: #aaa;
            font-size: 1rem;
            margin-top: 20px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li {
            background-color: #2a2a2a;
            margin: 6px 0;
            padding: 10px 14px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .action-btns { display: flex; align-items: center; gap: 12px; }
        .move-btn {
            background-color: #333;
            color: #ff4a5a;
            padding: 4px 10px;
            font-size: 0.85rem;
            border-radius: 4px;
        }
        .move-btn:hover { background-color: #ff4a5a; color: white; }
        .delete-btn { background: none; color: #666; padding: 0 5px; font-size: 0.9em; }
        .delete-btn:hover { color: #ff4a5a; background: none; }
    </style>
</head>
<body>

    <h1>🎬 Primal fear</h1>
    
    <div class="input-area">
        <input type="text" id="mediaTitle" placeholder="Type name here...">
        <div class="row">
            <select id="mediaType" onchange="updateStatusOptions()">
                <option value="movie">🎬 Movie</option>
                <option value="serial">📺 Serial</option>
            </select>
            <select id="mediaStatus">
                <option value="watchlist">⏳ Want to Watch</option>
                <option value="watched">✅ Watched & Completed</option>
            </select>
        </div>
        <button onclick="addMedia()">Add to Log</button>
    </div>

    <!-- MOVIES SECTION -->
    <div class="category-block">
        <h2 class="category-title">🎬 Movies</h2>
        <h3>⏳ Watchlist</h3>
        <ul id="movie-watchlist"></ul>
        <h3>✅ Watched & Completed</h3>
        <ul id="movie-watched"></ul>
    </div>

    <!-- SERIALS SECTION -->
    <div class="category-block">
        <h2 class="category-title">📺 Serials & TV Shows</h2>
        <h3>🍿 Currently Watching</h3>
        <ul id="serial-watching"></ul>
        <h3>⏳ Watchlist</h3>
        <ul id="serial-watchlist"></ul>
        <h3>✅ Watched & Completed</h3>
        <ul id="serial-watched"></ul>
    </div>

    <script>
        // =========================================================
        // STEP 2.1: LINK YOUR DATABASE HERE!
        // Replace the placeholders below with your actual keys from Supabase
        // =========================================================
        const SUPABASE_URL = "https://liqqdromclsdhlgpasao.supabase.co";
        const SUPABASE_KEY = "sb_publishable_2l0Bfembiw0shrvgih64hw_DsvjbkdD";
        
        // Connect our code to the Supabase library
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Load the list directly from the internet cloud when opened
        fetchMediaList();

        function updateStatusOptions() {
            const type = document.getElementById('mediaType').value;
            const statusDropdown = document.getElementById('mediaStatus');
            if (type === 'movie') {
                statusDropdown.innerHTML = `
                    <option value="watchlist">⏳ Want to Watch</option>
                    <option value="watched">✅ Watched & Completed</option>
                `;
            } else {
                statusDropdown.innerHTML = `
                    <option value="watching">🍿 Currently Watching</option>
                    <option value="watchlist">⏳ Want to Watch</option>
                    <option value="watched">✅ Watched & Completed</option>
                `;
            }
        }

        // Fetch the active data array from the cloud database
        async function fetchMediaList() {
            let { data: watchlist, error } = await supabase
                .from('watchlist')
                .select('*');

            if (error) {
                console.error("Error loading data:", error);
            } else {
                displayList(watchlist || []);
            }
        }

        // Add item to cloud
        async function addMedia() {
            const titleInput = document.getElementById('mediaTitle');
            const typeInput = document.getElementById('mediaType');
            const statusInput = document.getElementById('mediaStatus');

            if (titleInput.value.trim() === "") {
                alert("Please type a title first!");
                return;
            }

            const { error } = await supabase
                .from('watchlist')
                .insert([
                    { title: titleInput.value, type: typeInput.value, status: statusInput.value }
                ]);

            if (error) {
                alert("Error adding item to cloud.");
            } else {
                titleInput.value = "";
                fetchMediaList(); // Refresh data from cloud
            }
        }

        // Advance item status on the cloud
        async function moveNext(id, currentStatus, type) {
            let nextStatus = 'watched';
            if (currentStatus === 'watchlist' && type === 'serial') {
                nextStatus = 'watching';
            }

            const { error } = await supabase
                .from('watchlist')
                .update({ status: nextStatus })
                .eq('id', id);

            if (error) {
                alert("Error updating item.");
            } else {
                fetchMediaList();
            }
        }

        // Remove item from cloud
        async function deleteMedia(id) {
            const { error } = await supabase
                .from('watchlist')
                .delete()
                .eq('id', id);

            if (error) {
                alert("Error deleting item.");
            } else {
                fetchMediaList();
            }
        }

        function displayList(mediaList) {
            document.getElementById('movie-watchlist').innerHTML = "";
            document.getElementById('movie-watched').innerHTML = "";
            document.getElementById('serial-watching').innerHTML = "";
            document.getElementById('serial-watchlist').innerHTML = "";
            document.getElementById('serial-watched').innerHTML = "";

            mediaList.forEach(item => {
                const li = document.createElement('li');
                let moveButtonHtml = '';
                if (item.status !== 'watched') {
                    let nextLabel = item.status === 'watchlist' && item.type === 'serial' ? 'Start Watching →' : 'Completed →';
                    moveButtonHtml = `<button class="move-btn" onclick="moveNext(${item.id}, '${item.status}', '${item.type}')">${nextLabel}</button>`;
                }

                li.innerHTML = `
                    <span><strong>${item.title}</strong></span>
                    <div class="action-btns">
                        ${moveButtonHtml}
                        <button class="delete-btn" onclick="deleteMedia(${item.id})">✕</button>
                    </div>
                `;
                
                const listId = `${item.type}-${item.status}`;
                const targetList = document.getElementById(listId);
                if (targetList) {
                    targetList.appendChild(li);
                }
            });
        }
    </script>
</body>
</html>
