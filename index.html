<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primal Fear</title>
    
    <!-- Load the official Supabase library correctly -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            color: #ffffff;
            border-bottom: 2px solid #ff4a5a;
            padding-bottom: 10px;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .input-area {
            background-color: #262626;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row select, .row input {
            flex: 1;
        }
        input, select, button {
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
        }
        input, select {
            background-color: #333333;
            color: #ffffff;
        }
        input::placeholder {
            color: #888888;
        }
        button {
            background-color: #ff4a5a;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #e03e4d;
        }
        .category-block {
            margin-bottom: 35px;
        }
        h2 {
            color: #ff4a5a;
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-left: 4px solid #ff4a5a;
            padding-left: 10px;
        }
        h3 {
            color: #aaaaaa;
            font-size: 1.1rem;
            margin: 20px 0 10px 0;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            background-color: #262626;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .item-text {
            font-weight: 500;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
        }
        .btn-next {
            background-color: #34c759;
        }
        .btn-next:hover {
            background-color: #28a745;
        }
        .btn-delete {
            background-color: #555555;
        }
        .btn-delete:hover {
            background-color: #444444;
        }
        .empty-msg {
            color: #666666;
            font-style: italic;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <!-- Header updated to exact casing -->
    <h1>Primal Fear</h1>

    <!-- Inputs to log a new show -->
    <div class="input-area">
        <input type="text" id="mediaTitle" placeholder="Enter movie or show title...">
        <div class="row">
            <select id="mediaType" onchange="updateStatusOptions()">
                <option value="movie">🎬 Movie</option>
                <option value="serial">📺 TV Show</option>
            </select>
            <select id="mediaStatus">
                <option value="watchlist">⏳ Want to Watch</option>
                <option value="watched">✅ Watched & Completed</option>
            </select>
        </div>
        <button onclick="addMedia()">Add to Log</button>
    </div>

    <!-- Container for displaying columns -->
    <h2>🎬 Movies</h2>
    <div class="category-block">
        <h3>⏳ Watchlist</h3>
        <ul id="movie-watchlist"></ul>
        
        <h3>✅ Watched & Completed</h3>
        <ul id="movie-watched"></ul>
    </div>

    <h2>📺 TV Shows</h2>
    <div class="category-block">
        <h3>👀 Currently Watching</h3>
        <ul id="serial-watching"></ul>

        <h3>⏳ Watchlist</h3>
        <ul id="serial-watchlist"></ul>
        
        <h3>✅ Watched & Completed</h3>
        <ul id="serial-watched"></ul>
    </div>

    <script>
        // ==========================================
        // CONNECT TO YOUR SUPABASE CLOUD DATABASE
        // ==========================================
        const SUPABASE_URL = "https://liqqdromclsdhlgpasao.supabase.co";
        const SUPABASE_KEY = "sb_publishable_2l0Bfembiw0shrvgih64hw_DsvjbkdD";
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fetch data immediately when the app loads
        fetchMediaList();

        // Adjust dropdown selection modes instantly based on Movie vs Serial
        function updateStatusOptions() {
            const type = document.getElementById('mediaType').value;
            const statusDropdown = document.getElementById('mediaStatus');
            
            if (type === 'movie') {
                statusDropdown.innerHTML = `
                    <option value="watchlist">⏳ Want to Watch</option>
                    <option value="watched">✅ Watched & Completed</option>
                `;
            } else {
                statusDropdown.innerHTML = `
                    <option value="watching">👀 Currently Watching</option>
                    <option value="watchlist">⏳ Want to Watch</option>
                    <option value="watched">✅ Watched & Completed</option>
                `;
            }
        }

        // Pull saved data array from cloud
        async function fetchMediaList() {
            let { data: watchlist, error } = await db
                .from('Watchlist')
                .select('*');

            if (error) {
                console.error("Error loading cloud data:", error);
            } else {
                displayList(watchlist || []);
            }
        }

        // Add item to cloud
        async function addMedia() {
            const titleInput = document.getElementById('mediaTitle');
            const typeInput = document.getElementById('mediaType');
            const statusInput = document.getElementById('mediaStatus');

            if (titleInput.value.trim() === "") {
                alert("Please type a title first!");
                return;
            }

            const { error } = await db
                .from('Watchlist')
                .insert([
                    { Title: titleInput.value.trim(), Type: typeInput.value, Status: statusInput.value }
                ]);

            if (error) {
                alert("Error adding item to cloud.");
                console.error(error);
            } else {
                titleInput.value = "";
                fetchMediaList(); // Refresh lists
            }
        }

        // Progress item through cycle states
        async function moveNext(id, currentStatus, type) {
            let nextStatus = 'watched';
            if (currentStatus === 'watchlist' && type === 'serial') {
                nextStatus = 'watching';
            } else if (currentStatus === 'watching') {
                nextStatus = 'watched';
            }

            const { error } = await db
                .from('Watchlist')
                .update({ Status: nextStatus })
                .eq('id', id);

            if (error) {
                console.error("Error moving item status:", error);
            } else {
                fetchMediaList();
            }
        }

        // Delete completely from the table
        async function deleteMedia(id) {
            const { error } = await db
                .from('Watchlist')
                .delete()
                .eq('id', id);

            if (error) {
                console.error("Error deleting item:", error);
            } else {
                fetchMediaList();
            }
        }

        // Sort items out into their correct HTML lists
        function displayList(items) {
            const lists = {
                'movie-watchlist': document.getElementById('movie-watchlist'),
                'movie-watched': document.getElementById('movie-watched'),
                'serial-watching': document.getElementById('serial-watching'),
                'serial-watchlist': document.getElementById('serial-watchlist'),
                'serial-watched': document.getElementById('serial-watched')
            };

            // Clear old HTML states completely
            Object.values(lists).forEach(list => list.innerHTML = "");

            // Track how many items hit each bucket to handle fallback text
            const counts = { 'movie-watchlist': 0, 'movie-watched': 0, 'serial-watching': 0, 'serial-watchlist': 0, 'serial-watched': 0 };

            items.forEach(item => {
                const itemTitle = item.Title || item.title;
                const itemType = item.Type || item.type;
                const itemStatus = item.Status || item.status;

                const listKey = `${itemType}-${itemStatus}`;
                if (lists[listKey]) {
                    counts[listKey]++;
                    
                    const li = document.createElement('li');
                    
                    let actionButtons = '';
                    
                    // Add state progression button if not completed
                    if (itemStatus !== 'watched') {
                        let label = itemStatus === 'watchlist' && itemType === 'serial' ? 'Start 👀' : 'Done ✅';
                        actionButtons += `<button class="btn-action btn-next" onclick="moveNext(${item.id}, '${itemStatus}', '${itemType}')">${label}</button>`;
                    }
                    
                    // Only attach the remove button if it's explicitly in a watchlist bucket
                    if (itemStatus === 'watchlist') {
                        actionButtons += `<button class="btn-action btn-delete" onclick="deleteMedia(${item.id})">Remove 🗑️</button>`;
                    }

                    li.innerHTML = `
                        <span class="item-text">${itemTitle}</span>
                        <div class="actions">${actionButtons}</div>
                    `;
                    lists[listKey].appendChild(li);
                }
            });

            // Set empty messages if sections have no logged titles
            Object.keys(lists).forEach(key => {
                if (counts[key] === 0) {
                    lists[key].innerHTML = `<div class="empty-msg">No titles logged.</div>`;
                }
            });
        }
    </script>
</body>
</html>
